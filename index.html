<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Galería - Web</title>
    <!-- Boostrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="navbar-brand fw-bold" href="index.html">
                            <i class="bi bi-house"></i> Inicio
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <!-- Header mejorado con padding responsivo -->
    <header class="py-3 py-md-4 py-lg-5 bg-white border-bottom">
        <div class="container">
            <h1 class="h2 h1-md text-center fw-bold text-dark">
                Lista de Álbumes
            </h1>
        </div>
    </header>

    <!-- Grupo de Tarjetas con mejor espaciado responsivo -->
    <main class="flex-grow-1">
        <div class="container my-4 my-md-5">
            <div class="row g-3 g-md-4 g-lg-5">

                <!-- Tarjeta para Album 1 -->
                <div class="col-12 col-sm-6 col-md-4 col-lg-4 col-xl-4">
                    <div class="card h-100 border-0 shadow-sm hover-shadow transition-all">
                        <div class="card-body text-center p-3 p-md-4">
                            <div class="mb-3 mb-md-4">
                                <i class="bi bi-images fs-1 text-primary d-md-none"></i>
                                <img src="Images/movil.jpg" alt="descarga" class="img-fluid rounded-3 d-none d-md-inline-block" style="max-width: 150px; height: auto;">
                            </div>
                            <h5 class="card-title fw-bold mb-2 mb-md-3 fs-6 fs-md-5">Álbum 1</h5>
                            <a href="album1.html" class="btn btn-primary btn-sm w-100 stretched-link position-relative z-0">Ver</a>
                        </div>
                    </div>
                </div>

                <!-- Tarjeta para Album 2 -->
                <div class="col-12 col-sm-6 col-md-4 col-lg-4 col-xl-4">
                    <div class="card h-100 border-0 shadow-sm hover-shadow transition-all">
                        <div class="card-body text-center p-3 p-md-4">
                            <div class="mb-3 mb-md-4">
                                <i class="bi bi-images fs-1 text-primary d-md-none"></i>
                                <img src="Images/desktop.png" alt="descarga" class="img-fluid rounded-3 d-none d-md-inline-block" style="max-width: 150px; height: auto;">
                            </div>
                            <h5 class="card-title fw-bold mb-2 mb-md-3 fs-6 fs-md-5">Álbum 2</h5>
                            <a href="album2.html" class="btn btn-primary btn-sm w-100 stretched-link position-relative z-0"> Ver</a>
                        </div>
                    </div>
                </div>

                <!-- Tarjeta para Album 3 -->
                <div class="col-12 col-sm-6 col-md-4 col-lg-4 col-xl-4">
                    <div class="card h-100 border-0 shadow-sm hover-shadow transition-all">
                        <div class="card-body text-center p-3 p-md-4">
                            <div class="mb-3 mb-md-4">
                                <i class="bi bi-images fs-1 text-primary d-md-none"></i>
                                <img src="Images/movil.jpg" alt="descarga" class="img-fluid rounded-3 d-none d-md-inline-block" style="max-width: 150px; height: auto;">
                            </div>
                            <h5 class="card-title fw-bold mb-2 mb-md-3 fs-6 fs-md-5">Álbum 3</h5>
                            <a href="album3.html" class="btn btn-primary btn-sm w-100 stretched-link position-relative z-0"> Ver</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-3 py-md-4 mt-auto">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-12 col-md-6 text-center text-md-center mb-2 mb-md-0">
                    <p class="mb-0 ">
                        <i class="bi bi-c-circle me-1"></i>Sitio Web Galería. Todos los derechos reservados
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
