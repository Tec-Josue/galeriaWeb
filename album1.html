    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
    <!-- Script de Photo Swipe v5 -->
    <script type="module">
        import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5.4.3/dist/photoswipe-lightbox.esm.js';

        const lightbox = new PhotoSwipeLightbox({
            gallery: '#my-gallery', // El contenedor de tus fotos
            children: 'a',          // Los enlaces que abren las fotos
            pswpModule: () => import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe.esm.js'),
            // Esto asegura que los controles básicos estén activos
            closeTitle: 'Cerrar galería',
            zoomTitle: 'Aumentar'
        });
        lightbox.init();



    </script>

    <style>
        /* Hacer el botón de cerrar más grande y visible */
        .pswp__button--close {
            background-color: rgba(0, 0, 0, 0.3) !important;
            /* Fondo semi-transparente */
            border-radius: 50%;
            /* Lo hace circular */
            margin: 10px;
            opacity: 1 !important;
            /* Que siempre sea visible */
            transform: scale(1.2);
            /* Aumenta el tamaño un 20% */
        }

        /* Cambiar el color de la X a blanco puro */
        .pswp__icn {
            fill: #fff;
        }
    </style>
